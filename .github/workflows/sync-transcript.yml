name: Sync Microsoft Learn data

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TRANSCRIPT_SHARE_ID: ${{ secrets.TRANSCRIPT_SHARE_ID }}
      LEARN_LOCALE: ${{ vars.LEARN_LOCALE || 'en-us' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync Applied Skills catalog into data/skills.json
        run: python scripts/sync_catalog.py

      - name: Sync transcript into data/skills.json
        if: ${{ env.TRANSCRIPT_SHARE_ID != '' }}
        run: python scripts/sync_transcript.py

      - name: Commit changes if any
        run: |
          if [[ -n "$(git status --porcelain data/skills.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/skills.json
            git commit -m "chore: sync Applied Skills from Microsoft Learn"
            git push
          else
            echo "No changes to commit."
          fi
